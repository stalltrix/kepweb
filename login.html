<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>登录</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:#f5f7fb;
    font-family:Arial, Helvetica, sans-serif;
    color:#333;
}

header{
    width:100%;
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    position:sticky;
    top:0;
    z-index:100;
}

.nav-inner{
    max-width:1100px;
    margin:0 auto;
    padding:15px 20px;
}

.card{
    width:100%;
    max-width:460px;
    margin:auto;
    background:#fff;
    border-radius:18px;
    padding:40px 36px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
h2{
    margin:0 0 10px;
    color:#111827;
    font-size:28px;
}
.desc{
    color:#6b7280;
    line-height:1.6;
    margin-bottom:28px;
    font-size:14px;
}
.form-group{
    margin-bottom:20px;
}
label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:600;
    color:#374151;
}
input{
    width:100%;
    padding:13px 14px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
    transition:border-color 0.2s;
}
input:focus{
    outline:none;
    border-color:#2563eb;
}
.password-tip{
    margin-top:8px;
    font-size:12px;
    color:#6b7280;
}
.submit-btn{
    width:100%;
    border:none;
    background:#2563eb;
    color:white;
    padding:14px;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:all 0.2s ease;
}
.submit-btn:hover{
    background:#1d4ed8;
}
.submit-btn:disabled{
    background:#93c5fd;
    cursor:not-allowed;
}
.message{
    margin-top:18px;
    font-size:14px;
    text-align:center;
}
.success{
    color:#15803d;
}
.error{
    color:#dc2626;
}
.logo { font-size: 1.2rem; font-weight: bold; color: #3498db; cursor: pointer; }
</style>
</head>

<body>
<header>
<div class="nav-inner">
<div class="logo" onclick="resetPage()">stalltrix</div>
</div>
</header>

<div class="card">

    <h2>欢迎回来</h2>

    <div class="desc">
        使用你设置的用户名与密码进行登录。
    </div>

    <form id="regForm">

        <div class="form-group">
            <label for="username">用户名</label>
            <input
                type="text"
                id="username"
                name="username"
                placeholder="请输入用户名"
                minlength="3"
                maxlength="24"
                required
            />
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="请输入密码"
                minlength="8"
                required
            />

            <div class="password-tip">
                密码注意大小写字母敏感、空格敏感。
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
            登录
        </button>

    </form>

    <div class="message" id="message"></div>
<div style="margin-top:18px;padding-top:14px;border-top:1px solid #e9e9e9">
<div style="font-size:13px;color:#919191;text-align:center;margin-bottom:12px">
或使用第三方注册
</div>
<div style="display:flex;justify-content:center;gap:14px">
<div onclick="location.href='#'" 
style="width:36px;height:36px;border:1px solid #e9e9e9;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff">
<svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">

</div>

<script>
const form = document.getElementById("regForm");
const submitBtn = document.getElementById("submitBtn");
const messageBox = document.getElementById("message");

form.addEventListener("submit", async function(e){
    e.preventDefault();

    const user = document.getElementById("username").value.trim();
    const token = document.getElementById("password").value;

	if(!user || !token){
		messageBox.innerText="请输入用户名和密码";
		return;
	}

	messageBox.innerHTML = "";

    submitBtn.disabled = true;
    submitBtn.innerText = "登录中...";

    try{
        const res = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
			credentials:"include",
            body:JSON.stringify({ user,token })
        });

        if(res.ok){
const data = await res.json();
if(data.status===1){
	messageBox.className = "message success";
    messageBox.innerText =  data.user+"，欢迎";
    setTimeout(() => {
        window.location.href = "/index.php";
    }, 1000);
}else{
messageBox.className = "message error";
messageBox.innerText="登录失败";
}
        }else{
			const data = await res.text();
            messageBox.className = "message error";
            messageBox.innerText = "登录失败"+data;
        }

    }catch(err){
        messageBox.className = "message error";
        messageBox.innerText = "网络错误，请稍后重试";
    }

    submitBtn.disabled = false;
    submitBtn.innerText = "登录";
});
function resetPage(){
	location.href="/index.php";
}
</script>

</body>
</html>
